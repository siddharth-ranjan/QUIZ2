<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Revision Quiz</title>
    <style>
        :root {
            --bg: #eef4ff;
            --card: #ffffff;
            --card-muted: #f6f9ff;
            --line: #d6e0f5;
            --text: #213047;
            --subtle: #5f6f86;
            --primary: #1456c4;
            --primary-soft: #e8f0ff;
            --success: #1f8f57;
            --success-soft: #eaf8f0;
            --danger: #c23a30;
            --danger-soft: #fdeceb;
            --shadow: 0 20px 50px rgba(20, 46, 92, 0.12);
        }
        * {
            box-sizing: border-box;
        }
        body {
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, #edf4ff 0%, #f7fbff 100%);
            color: var(--text);
            line-height: 1.6;
            padding: 20px;
            margin: 0;
        }
        .quiz-container {
            max-width: 1100px;
            margin: 24px auto;
            background: var(--card);
            padding: 30px;
            border-radius: 24px;
            box-shadow: var(--shadow);
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            align-items: flex-start;
            margin-bottom: 22px;
        }
        h1 {
            margin: 0 0 6px 0;
            color: var(--primary);
        }
        .subtitle {
            color: var(--subtle);
            font-size: 0.97rem;
            margin: 0;
        }
        .topbar-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .chip-btn,
        .mini-btn {
            border: 1px solid var(--line);
            background: #fff;
            color: var(--text);
            border-radius: 999px;
            cursor: pointer;
            transition: 0.2s ease;
        }
        .chip-btn {
            padding: 10px 14px;
            font-weight: 600;
        }
        .chip-btn:hover,
        .mini-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .chip-btn.active,
        .mini-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .mini-btn {
            padding: 7px 12px;
            font-size: 0.9rem;
        }
        .controls-panel,
        .info-grid,
        .quiz-layout {
            margin-bottom: 20px;
        }
        .controls-panel {
            background: var(--card-muted);
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 18px;
        }
        .control-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .control-label {
            min-width: 120px;
            font-weight: 700;
            color: var(--subtle);
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 14px;
        }
        .info-card {
            background: var(--card-muted);
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 16px;
        }
        .info-label {
            color: var(--subtle);
            font-size: 0.84rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .info-value {
            margin-top: 6px;
            font-size: 1.2rem;
            font-weight: 700;
        }
        .progress-meta {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            margin-bottom: 8px;
            color: var(--subtle);
            font-size: 0.92rem;
        }
        .progress-bar {
            height: 8px;
            background-color: #dce6f7;
            border-radius: 99px;
            margin-bottom: 24px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1d62d8 0%, #4f8cff 100%);
            width: 0%;
            transition: width 0.3s ease;
        }
        .quiz-layout {
            display: grid;
            grid-template-columns: minmax(0, 2fr) minmax(290px, 1fr);
            gap: 20px;
            align-items: start;
        }
        .main-panel,
        .side-panel {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 22px;
        }
        .question-card {
            display: none;
        }
        .question-card.active {
            display: block;
        }
        .question-head {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: flex-start;
            margin-bottom: 14px;
        }
        .tag {
            display: inline-block;
            background: var(--primary-soft);
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .bookmark-btn {
            border: 1px solid var(--line);
            background: #fff;
            padding: 9px 14px;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 600;
        }
        .bookmark-btn.active {
            background: #fff3d8;
            border-color: #f3c15f;
            color: #8a5a00;
        }
        .question-text {
            font-size: 1.16rem;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .options-list {
            list-style: none;
            padding: 0;
            margin: 0 0 18px 0;
        }
        .option-btn {
            display: block;
            width: 100%;
            background: #fff;
            border: 2px solid #dee6f3;
            padding: 14px 18px;
            margin-bottom: 12px;
            border-radius: 14px;
            text-align: left;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .option-btn:hover:not([disabled]) {
            border-color: var(--primary);
            background-color: #f8fbff;
        }
        .option-btn[disabled] {
            cursor: not-allowed;
        }
        .option-btn.correct {
            background-color: var(--success-soft);
            border-color: var(--success);
            color: #16663f;
            font-weight: 700;
        }
        .option-btn.wrong {
            background-color: var(--danger-soft);
            border-color: var(--danger);
            color: #972d25;
        }
        .feedback {
            display: none;
            padding: 16px;
            border-radius: 14px;
            margin-bottom: 18px;
            font-size: 0.95rem;
        }
        .feedback.show {
            display: block;
        }
        .feedback-title {
            font-weight: 700;
            margin-bottom: 8px;
        }
        .feedback.correct-style {
            background-color: var(--success-soft);
            color: #16663f;
            border-left: 5px solid var(--success);
        }
        .feedback.wrong-style {
            background-color: var(--danger-soft);
            color: #972d25;
            border-left: 5px solid var(--danger);
        }
        .action-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .action-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 16px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            display: block;
            flex: 1;
        }
        .action-btn:hover {
            background: #0e47a9;
        }
        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .ghost-btn {
            background: #fff;
            color: var(--text);
            border: 1px solid var(--line);
        }
        .ghost-btn:hover {
            background: var(--card-muted);
        }
        .panel-title {
            font-size: 1rem;
            font-weight: 700;
            margin: 0 0 12px 0;
        }
        .side-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .side-item {
            border: 1px solid var(--line);
            background: var(--card-muted);
            border-radius: 14px;
            padding: 14px;
        }
        .side-item h4 {
            margin: 0 0 6px 0;
            font-size: 0.95rem;
        }
        .side-item p {
            margin: 0;
            color: var(--subtle);
            font-size: 0.9rem;
        }
        .empty-state {
            border: 1px dashed var(--line);
            border-radius: 14px;
            padding: 16px;
            color: var(--subtle);
            background: #fbfdff;
        }
        .results-screen {
            display: none;
            text-align: center;
            padding-top: 10px;
        }
        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--primary-soft);
            color: var(--primary);
            font-size: 2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            border: 4px solid var(--primary);
        }
        .leaderboard-form {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0 16px;
        }
        .leaderboard-form input {
            min-width: 230px;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 0.98rem;
        }
        .leaderboard {
            text-align: left;
            border: 1px solid var(--line);
            background: var(--card-muted);
            border-radius: 16px;
            padding: 16px;
            margin-top: 18px;
        }
        .leaderboard-entry {
            display: grid;
            grid-template-columns: 44px minmax(0, 1fr) auto;
            gap: 12px;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--line);
        }
        .leaderboard-entry:last-child {
            border-bottom: 0;
        }
        .leaderboard-rank {
            font-weight: 700;
            color: var(--primary);
        }
        .leaderboard-meta {
            color: var(--subtle);
            font-size: 0.88rem;
        }
        .hidden {
            display: none !important;
        }
        @media (max-width: 900px) {
            .quiz-layout,
            .info-grid {
                grid-template-columns: 1fr;
            }
            .topbar,
            .progress-meta {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="topbar">
        <div>
            <h1>Tech Revision Quiz</h1>
            <p class="subtitle">Switch subjects, review bookmarked questions, and track scores locally.</p>
        </div>
        <div class="topbar-actions">
            <button class="mini-btn" onclick="setQuestionMode('all')" id="mode-all-btn">All Questions</button>
            <button class="mini-btn" onclick="setQuestionMode('bookmarked')" id="mode-bookmarked-btn">Bookmarks</button>
            <button class="mini-btn" onclick="setQuestionMode('wrong')" id="mode-wrong-btn">Wrong Answers</button>
        </div>
    </div>

    <div class="controls-panel">
        <div class="control-row" id="subject-filters">
            <div class="control-label">Subjects</div>
        </div>
        <div class="control-row" id="set-filters" style="margin-top:12px;">
            <div class="control-label">Question Sets</div>
        </div>
    </div>

    <div class="info-grid">
        <div class="info-card">
            <div class="info-label">Current View</div>
            <div class="info-value" id="current-view-label">All Questions</div>
        </div>
        <div class="info-card">
            <div class="info-label">Question Set</div>
            <div class="info-value" id="question-set-size">0</div>
        </div>
        <div class="info-card">
            <div class="info-label">Bookmarks</div>
            <div class="info-value" id="bookmark-count">0</div>
        </div>
        <div class="info-card">
            <div class="info-label">Wrong Answers</div>
            <div class="info-value" id="wrong-count">0</div>
        </div>
    </div>

    <div class="progress-meta">
        <span id="progress-label">Question 0 of 0</span>
        <span id="accuracy-label">Accuracy: 0%</span>
    </div>
    <div class="progress-bar">
        <div class="progress-fill" id="progress"></div>
    </div>

    <div class="quiz-layout" id="quiz-layout">
        <div class="main-panel">
            <div id="quiz-body"></div>

            <div id="feedback-box" class="feedback">
                <div class="feedback-title" id="feedback-status"></div>
                <div id="feedback-text"></div>
            </div>

            <div class="action-row">
                <button id="prev-btn" class="action-btn ghost-btn" onclick="previousQuestion()">Back</button>
                <button id="next-btn" class="action-btn" onclick="nextQuestion()">Next Question</button>
                <button id="restart-btn" class="action-btn ghost-btn" onclick="restartQuiz()" style="display:block;">Restart</button>
            </div>

            <div id="results" class="results-screen">
                <h2>Quiz Completed</h2>
                <div class="score-circle" id="score-display">0/0</div>
                <p id="score-commentary"></p>
                <div class="leaderboard-form">
                    <input type="text" id="player-name" maxlength="30" placeholder="Enter your name for leaderboard">
                    <button class="chip-btn" onclick="saveScore()">Save Score</button>
                </div>
                <button class="chip-btn" onclick="restartQuiz()">Restart Quiz</button>
                <div class="leaderboard">
                    <div class="panel-title">Leaderboard</div>
                    <div id="leaderboard-list"></div>
                </div>
            </div>
        </div>

        <aside class="side-panel">
            <div class="panel-title">Relevant Information</div>
            <div class="side-list" id="relevant-info"></div>
            <div class="panel-title" style="margin-top:18px;">Bookmarked Questions</div>
            <div id="bookmark-list"></div>
        </aside>
    </div>
</div>

    const bookmarkCount = document.getElementById('bookmark-count');
    const wrongCount = document.getElementById('wrong-count');
    const relevantInfo = document.getElementById('relevant-info');
    const bookmarkList = document.getElementById('bookmark-list');
    const leaderboardList = document.getElementById('leaderboard-list');

    function loadBookmarks() {
        try {
            return JSON.parse(localStorage.getItem(STORAGE_KEYS.bookmarks) || "[]");
        } catch (error) {
            return [];
        }
    }

    function saveBookmarks() {
        localStorage.setItem(STORAGE_KEYS.bookmarks, JSON.stringify(bookmarks));
    }

    function loadLeaderboard() {
        try {
            return JSON.parse(localStorage.getItem(STORAGE_KEYS.leaderboard) || "[]");
        } catch (error) {
            return [];
        }
    }

    function saveLeaderboard(entries) {
        localStorage.setItem(STORAGE_KEYS.leaderboard, JSON.stringify(entries));
    }

    function getSubjects() {
        return ["All", ...new Set(questionBank.map(item => item.topic))];
    }

    function assignQuestionSets(items, totalSets, setSize) {
        const topicIndexes = {};

        return items.map(item => {
            const topicIndex = topicIndexes[item.topic] || 0;
            topicIndexes[item.topic] = topicIndex + 1;

            return {
                ...item,
                setNumber: Math.floor(topicIndex / setSize) + 1
            };
        }).filter(item => item.setNumber <= totalSets);
    }

    function slugify(value) {
        return String(value).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
    }

    function getSubjectQuestions() {
        if (activeSubject === "All") {
            return questionBank;
        }
        return questionBank.filter(item => item.topic === activeSubject);
    }

    function getActiveQuestionSet() {
        let baseQuestions = getSubjectQuestions();

        if (activeSet !== "all") {
            baseQuestions = baseQuestions.filter(item => item.setNumber === activeSet);
        }

        if (questionMode === "bookmarked") {
            return baseQuestions.filter(item => bookmarks.includes(item.id));
        }

        if (questionMode === "wrong") {
            const wrongIds = new Set(wrongAnswers.map(item => item.id));
            return baseQuestions.filter(item => wrongIds.has(item.id));
        }

        return baseQuestions;
    }

    function buildSubjectFilters() {
        const buttons = getSubjects().map(subject => `
            <button
                class="chip-btn ${subject === activeSubject ? "active" : ""}"
                onclick='setSubject(${JSON.stringify(subject)})'
            >
                ${escapeHTML(subject)}
            </button>
        `).join("");

        subjectFilters.innerHTML = `<div class="control-label">Subjects</div>${buttons}`;
    }

    function buildSetFilters() {
        const buttons = [
            `<button class="chip-btn ${activeSet === "all" ? "active" : ""}" onclick="setQuestionSet('all')">All Sets</button>`,
            ...Array.from({ length: TOTAL_SETS }, (_, index) => {
                const setNumber = index + 1;
                return `
                    <button
                        class="chip-btn ${activeSet === setNumber ? "active" : ""}"
                        onclick="setQuestionSet(${setNumber})"
                    >
                        Set ${setNumber}
                    </button>
                `;
            })
        ].join("");

        setFilters.innerHTML = `<div class="control-label">Question Sets</div>${buttons}`;
    }

    function setSubject(subject) {
        activeSubject = subject;
        resetSessionState();
        refreshModeButtons();
        buildSubjectFilters();
        buildSetFilters();
        prepareQuestionSet();
    }

    function setQuestionSet(setValue) {
        activeSet = setValue;
        resetSessionState();
        buildSetFilters();
        prepareQuestionSet();
    }

    function setQuestionMode(mode) {
        questionMode = mode;
        resetSessionState();
        refreshModeButtons();
        prepareQuestionSet();
    }

    function refreshModeButtons() {
        ["all", "bookmarked", "wrong"].forEach(mode => {
            const button = document.getElementById(`mode-${mode}-btn`);
            button.classList.toggle("active", questionMode === mode);
        });
    }

    function prepareQuestionSet() {
        activeQuestions = getActiveQuestionSet();
        if (currentQuestionIdx >= activeQuestions.length) {
            currentQuestionIdx = 0;
        }
        updateInfoPanels();
        loadQuestion();
    }

    function updateInfoPanels() {
        const totalQuestions = activeQuestions.length;
        const accuracy = answeredCount ? Math.round((score / answeredCount) * 100) : 0;
        const setLabel = activeSet === "all" ? "All Sets" : `Set ${activeSet}`;
        const modeLabelMap = {
            all: activeSubject === "All" ? `${setLabel} Questions` : `${activeSubject} ${setLabel}`,
            bookmarked: `Bookmarked • ${setLabel}`,
            wrong: `Wrong Answers • ${setLabel}`
        };

        currentViewLabel.innerText = modeLabelMap[questionMode];
        questionSetSize.innerText = String(totalQuestions);
        bookmarkCount.innerText = String(bookmarks.length);
        wrongCount.innerText = String(wrongAnswers.length);
        accuracyLabel.innerText = `Accuracy: ${accuracy}%`;
        progressLabel.innerText = totalQuestions ? `Question ${Math.min(currentQuestionIdx + 1, totalQuestions)} of ${totalQuestions}` : "Question 0 of 0";

        renderRelevantInfo();
        renderBookmarkList();
        renderLeaderboard();
    }

    function renderRelevantInfo() {
        const subjectQuestions = getSubjectQuestions();
        const totalSubjectQuestions = subjectQuestions.length;
        const totalSetQuestions = activeSet === "all"
            ? totalSubjectQuestions
            : subjectQuestions.filter(item => item.setNumber === activeSet).length;
        const wrongTopics = wrongAnswers
            .filter(item => {
                const subjectMatch = activeSubject === "All" || item.topic === activeSubject;
                const setMatch = activeSet === "all" || item.setNumber === activeSet;
                return subjectMatch && setMatch;
            })
            .slice(-3)
            .map(item => `
                <div class="side-item">
                    <h4>${escapeHTML(item.topic)}</h4>
                    <p>${escapeHTML(item.question)}</p>
                </div>
            `).join("");

        relevantInfo.innerHTML = `
            <div class="side-item">
                <h4>Subject Coverage</h4>
                <p>${escapeHTML(activeSubject)} contains ${totalSubjectQuestions} question(s), with ${totalSetQuestions} in ${escapeHTML(activeSet === "all" ? "All Sets" : `Set ${activeSet}`)}.</p>
            </div>
            <div class="side-item">
                <h4>Session Progress</h4>
                <p>${answeredCount} answered, ${score} correct, ${wrongAnswers.length} wrong in this session.</p>
            </div>
            <div class="side-item">
                <h4>Review Tip</h4>
                <p>Use Bookmarks to save tricky questions and Wrong Answers to revisit missed concepts with explanations.</p>
            </div>
            ${wrongTopics || `<div class="empty-state">No recent wrong answers in this view yet.</div>`}
        `;
    }

    function renderBookmarkList() {
        const items = questionBank.filter(item => bookmarks.includes(item.id));

        if (!items.length) {
            bookmarkList.innerHTML = `<div class="empty-state">No bookmarks saved yet.</div>`;
            return;
        }

        bookmarkList.innerHTML = items.slice(0, 6).map(item => `
            <div class="side-item">
                <h4>${escapeHTML(item.topic)}</h4>
                <p>${escapeHTML(item.question)}</p>
            </div>
        `).join("");
    }

    function loadQuestion() {
        answered = false;
        feedbackBox.className = "feedback";

        const total = activeQuestions.length;
        const progressPercent = total ? (currentQuestionIdx / total) * 100 : 0;
        progressFill.style.width = `${progressPercent}%`;
        updateInfoPanels();
        prevBtn.disabled = currentQuestionIdx === 0;
        nextBtn.innerText = currentQuestionIdx === total - 1 ? "View Final Score" : "Next Question";

        if (!total) {
            quizBody.innerHTML = `
                <div class="empty-state">
                    No questions available for this filter. Try another subject, or add bookmarks by opening the All Questions view.
                </div>
            `;
            prevBtn.disabled = true;
            nextBtn.disabled = true;
            return;
        }

        nextBtn.disabled = false;

        if (currentQuestionIdx >= total) {
            showResults();
            return;
        }

        const q = activeQuestions[currentQuestionIdx];
        const isBookmarked = bookmarks.includes(q.id);

        let html = `
            <div class="question-card active">
                <div class="question-head">
                    <div class="tag">${escapeHTML(q.topic)}</div>
                    <button class="bookmark-btn ${isBookmarked ? "active" : ""}" onclick="toggleBookmark(${q.id})">
                        ${isBookmarked ? "Bookmarked" : "Bookmark"}
                    </button>
                </div>
                <div class="question-text">${escapeHTML(q.question).replace(/\n/g, '<br>')}</div>
                <div class="options-list">
        `;

        q.options.forEach((option, index) => {
            html += `
                <button class="option-btn" onclick="handleOptionClick(${index}, this)">
                    ${escapeHTML(option)}
                </button>
            `;
        });

        html += `</div></div>`;
        quizBody.innerHTML = html;
        renderStoredAnswerState(q);
    }

    function toggleBookmark(questionId) {
        if (bookmarks.includes(questionId)) {
            bookmarks = bookmarks.filter(id => id !== questionId);
        } else {
            bookmarks = [...bookmarks, questionId];
        }

        saveBookmarks();

        if (questionMode === "bookmarked") {
            activeQuestions = getActiveQuestionSet();
            if (currentQuestionIdx >= activeQuestions.length) {
                currentQuestionIdx = Math.max(0, activeQuestions.length - 1);
            }
        }

        updateInfoPanels();
        loadQuestion();
    }

    function handleOptionClick(selectedIndex, btnElement) {
        if (answered) return;
        answered = true;

        const q = activeQuestions[currentQuestionIdx];
        const allButtons = document.querySelectorAll('.option-btn');
        allButtons.forEach(btn => {
            btn.disabled = true;
        });

        answeredCount++;
        answeredQuestions[q.id] = { selectedIndex };

        if (selectedIndex === q.correct) {
            btnElement.classList.add('correct');
            feedbackStatus.innerText = "Correct";
            feedbackBox.className = "feedback show correct-style";
            feedbackText.innerHTML = `
                <strong>Why this is right:</strong> ${escapeHTML(q.explanation)}
            `;
            score++;
        } else {
            btnElement.classList.add('wrong');
            allButtons[q.correct].classList.add('correct');
            feedbackStatus.innerText = "Incorrect";
            feedbackBox.className = "feedback show wrong-style";
            feedbackText.innerHTML = `
                <strong>Your answer:</strong> ${escapeHTML(q.options[selectedIndex])}<br>
                <strong>Correct answer:</strong> ${escapeHTML(q.options[q.correct])}<br><br>
                <strong>Explanation:</strong> ${escapeHTML(q.explanation)}
            `;

            if (!wrongAnswers.some(item => item.id === q.id)) {
                wrongAnswers.push(q);
            }
        }

        updateInfoPanels();
    }

    function renderStoredAnswerState(question) {
        const storedAnswer = answeredQuestions[question.id];
        if (!storedAnswer) {
            return;
        }

        answered = true;
        const allButtons = document.querySelectorAll('.option-btn');
        allButtons.forEach(btn => {
            btn.disabled = true;
        });

        const selectedButton = allButtons[storedAnswer.selectedIndex];
        if (storedAnswer.selectedIndex === question.correct) {
            selectedButton.classList.add('correct');
            feedbackStatus.innerText = "Correct";
            feedbackBox.className = "feedback show correct-style";
            feedbackText.innerHTML = `
                <strong>Why this is right:</strong> ${escapeHTML(question.explanation)}
            `;
        } else {
            selectedButton.classList.add('wrong');
            allButtons[question.correct].classList.add('correct');
            feedbackStatus.innerText = "Incorrect";
            feedbackBox.className = "feedback show wrong-style";
            feedbackText.innerHTML = `
                <strong>Your answer:</strong> ${escapeHTML(question.options[storedAnswer.selectedIndex])}<br>
                <strong>Correct answer:</strong> ${escapeHTML(question.options[question.correct])}<br><br>
                <strong>Explanation:</strong> ${escapeHTML(question.explanation)}
            `;
        }
    }

    function previousQuestion() {
        if (currentQuestionIdx === 0) {
            return;
        }

        currentQuestionIdx--;
        loadQuestion();
    }

    function nextQuestion() {
        if (!activeQuestions.length) {
            return;
        }

        if (currentQuestionIdx >= activeQuestions.length - 1) {
            showResults();
            return;
        }

        currentQuestionIdx++;
        loadQuestion();
    }

    function showResults() {
        quizBody.innerHTML = "";
        feedbackBox.className = "feedback";
        prevBtn.disabled = true;
        nextBtn.disabled = true;
        progressFill.style.width = "100%";
        resultsDiv.style.display = "block";

        const total = activeQuestions.length;
        const percent = total ? Math.round((score / total) * 100) : 0;
        document.getElementById('score-display').innerText = `${score}/${total}`;

        let commentary = "";
        if (percent === 100) commentary = "Perfect score. Your coverage across this set is complete.";
        else if (percent >= 75) commentary = "Strong result. A quick wrong-answer review should close the remaining gaps.";
        else if (percent >= 50) commentary = "Solid baseline. Revisit bookmarked and wrong-answer views before the next attempt.";
        else commentary = "Use the explanations, bookmarks, and subject filters to rebuild weak areas before retrying.";

        document.getElementById('score-commentary').innerText = commentary;
        renderLeaderboard();
    }

    function saveScore() {
        const playerName = document.getElementById('player-name').value.trim() || "Anonymous";
        const total = activeQuestions.length;
        const percent = total ? Math.round((score / total) * 100) : 0;
        const entries = loadLeaderboard();

        entries.push({
            name: playerName,
            score,
            total,
            percent,
            view: currentViewLabel.innerText,
            date: new Date().toLocaleString()
        });

        entries.sort((a, b) => b.percent - a.percent || b.score - a.score);
        saveLeaderboard(entries.slice(0, 10));
        renderLeaderboard();
        document.getElementById('player-name').value = "";
    }

    function renderLeaderboard() {
        const entries = loadLeaderboard();

        if (!entries.length) {
            leaderboardList.innerHTML = `<div class="empty-state">No scores saved yet.</div>`;
            return;
        }

        leaderboardList.innerHTML = entries.map((entry, index) => `
            <div class="leaderboard-entry">
                <div class="leaderboard-rank">#${index + 1}</div>
                <div>
                    <div><strong>${escapeHTML(entry.name)}</strong></div>
                    <div class="leaderboard-meta">${escapeHTML(entry.view)} • ${escapeHTML(entry.date)}</div>
                </div>
                <div><strong>${entry.score}/${entry.total}</strong> (${entry.percent}%)</div>
            </div>
        `).join("");
    }

    function restartQuiz() {
        resetSessionState();
        wrongAnswers = [];
        prepareQuestionSet();
    }

    function resetSessionState() {
        currentQuestionIdx = 0;
        score = 0;
        answered = false;
        answeredCount = 0;
        answeredQuestions = {};
        resultsDiv.style.display = "none";
        feedbackBox.className = "feedback";
    }

    function escapeHTML(str) {
        return String(str).replace(/[&<>'"]/g,
            tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
        );
    }

    buildSubjectFilters();
    buildSetFilters();
    refreshModeButtons();
    prepareQuestionSet();
</script>

</body>
</html>
